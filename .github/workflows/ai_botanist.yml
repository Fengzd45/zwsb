name: AI 植物学家在线识别

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]

# 赋予机器人操作 Issue 的读写权限
permissions:
  issues: write
  contents: write

jobs:
  identify-plant:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 AI 核心依赖
        # 【关键修改】安装了 vertexai 和 google-cloud-aiplatform
        run: |
          pip install --upgrade google-cloud-aiplatform vertexai requests

      - name: 启动大模型替身进行识别
        # 防止网络卡死，设置5分钟超时
        timeout-minutes: 5
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: ${{ github.event.comment.body || github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          COMMENTER_USER: ${{ github.event.comment.user.login || '' }}
        run: |
          python ai_identifier.py
